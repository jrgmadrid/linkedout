<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      width: 300px;
      /* Chrome caps popups at 600px; capping here makes #sections the
         scroller so the footer never drops below the fold. */
      max-height: 600px;
      display: flex;
      flex-direction: column;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1d2226;
      background: #fbfcfe;
    }
    main {
      overflow-y: auto;
    }
    header {
      padding: 14px 16px 2px;
      font-size: 16px;
      font-weight: 600;
    }
    h2, h3 {
      margin: 14px 16px 2px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #5b6772;
    }
    h3 {
      margin: 10px 16px 2px 30px;
    }
    h2 label, h3 label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      cursor: pointer;
    }
    h2 input[type="checkbox"], h3 input[type="checkbox"] {
      width: 13px;
      height: 13px;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0 8px 4px;
    }
    ul.sub {
      padding-left: 22px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    label:hover {
      background: #f2f5f8;
    }
    label:has(input:focus-visible) {
      outline: 2px solid #0a66c2;
      outline-offset: -2px;
    }
    input[type="checkbox"] {
      accent-color: #0a66c2;
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }
    small {
      display: block;
      color: #5b6772;
      font-size: 12px;
    }
    footer {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 12px;
      border-top: 1px solid #e6eaef;
    }
    footer button {
      font: inherit;
      font-size: 13px;
      padding: 4px 10px;
      border: 1px solid #0a66c2;
      border-radius: 14px;
      background: none;
      color: #0a66c2;
      cursor: pointer;
    }
    footer button:hover {
      background: #eef3f8;
    }
    footer button.icon {
      display: inline-flex;
      align-items: center;
      padding: 4px 7px;
    }
    footer button.icon svg {
      width: 14px;
      height: 14px;
      display: block;
    }
  </style>
</head>
<body>
  <header>LinkedOut</header>
  <main id="sections"></main>
  <footer>
    <button id="reload" class="icon" title="Reload the extension and refresh LinkedIn tabs" aria-label="Reload the extension">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button id="settings" title="Judge key, feed forensics, other weirdo business">Advanced settings for weirdos</button>
  </footer>
  <script src="filters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
