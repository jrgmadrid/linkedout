<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      width: 280px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1d2226;
      background: #fff;
    }
    header {
      padding: 12px 16px 8px;
      font-size: 14px;
      font-weight: 600;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0 8px 8px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    label:hover {
      background: #f3f6f8;
    }
    input[type="checkbox"] {
      accent-color: #0a66c2;
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }
    small {
      display: block;
      color: #666;
      font-size: 11px;
    }
    footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 12px;
      border-top: 1px solid #e8e8e8;
    }
    footer button {
      font: inherit;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #0a66c2;
      border-radius: 14px;
      background: none;
      color: #0a66c2;
      cursor: pointer;
    }
    footer button:hover {
      background: #eef3f8;
    }
    #harvest-status {
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <header>Hide from feed</header>
  <ul id="filters"></ul>
  <footer>
    <button id="harvest">Export feed markers</button>
    <span id="harvest-status"></span>
  </footer>
  <script src="filters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
