<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      width: 280px;
      /* Chrome caps popups at 600px; capping here makes #sections the
         scroller so the footer never drops below the fold. */
      max-height: 600px;
      display: flex;
      flex-direction: column;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1d2226;
      background: #fbfcfe;
    }
    main {
      overflow-y: auto;
    }
    header {
      padding: 14px 16px 2px;
      font-size: 14px;
      font-weight: 600;
    }
    h2, h3 {
      margin: 14px 16px 2px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #5b6772;
    }
    h3 {
      margin: 10px 16px 2px 30px;
    }
    h2 label, h3 label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      cursor: pointer;
    }
    h2 input[type="checkbox"], h3 input[type="checkbox"] {
      width: 13px;
      height: 13px;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0 8px 4px;
    }
    ul.sub {
      padding-left: 22px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    label:hover {
      background: #f2f5f8;
    }
    label:has(input:focus-visible) {
      outline: 2px solid #0a66c2;
      outline-offset: -2px;
    }
    input[type="checkbox"] {
      accent-color: #0a66c2;
      width: 16px;
      height: 16px;
      margin: 0;
      flex-shrink: 0;
    }
    small {
      display: block;
      color: #5b6772;
      font-size: 11px;
    }
    footer {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 12px;
      border-top: 1px solid #e6eaef;
    }
    footer button {
      font: inherit;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #0a66c2;
      border-radius: 14px;
      background: none;
      color: #0a66c2;
      cursor: pointer;
    }
    footer button:hover {
      background: #eef3f8;
    }
    #harvest-status {
      font-size: 11px;
      color: #5b6772;
    }
  </style>
</head>
<body>
  <header>LinkedOut</header>
  <main id="sections"></main>
  <footer>
    <button id="reload" title="Reload the extension and refresh LinkedIn tabs">Reload</button>
    <button id="judge-cfg" title="API key for the LLM judge">Judge key</button>
  </footer>
  <script src="filters.js"></script>
  <script src="popup.js"></script>
</body>
</html>
